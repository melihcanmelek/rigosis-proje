<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Kayıt Oluşturma Formu</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 400px;
            margin: 50px auto;
            padding: 20px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: #2563eb;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #1d4ed8;
        }
        #sonucAlani {
            margin-top: 20px;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>

    <h2>Kayıt Formu</h2>

    <label for="adInput">Adınız:</label>
    <input type="text" id="adInput" placeholder="Adınızı girin">

    <label for="meslekInput">Mesleğiniz:</label>
    <input type="text" id="meslekInput" placeholder="Mesleğinizi girin">

    <button id="gonderButon">Gönder</button>

    <p id="sonucAlani"></p>

    <script>
        // Butona tıklanınca çalışacak fonksiyonu tanımlıyoruz
        document.getElementById("gonderButon").addEventListener("click", function() {

            // 1. Kullanıcının kutulara yazdığı verileri alıyoruz
            let ad = document.getElementById("adInput").value;
            let meslek = document.getElementById("meslekInput").value;

            // Basit bir kontrol: alanlar boşsa uyar
            if (ad === "" || meslek === "") {
                document.getElementById("sonucAlani").innerText = "Lütfen tüm alanları doldurun.";
                document.getElementById("sonucAlani").style.color = "red";
                return; // fonksiyonu burada durdur
            }

            // 2. API'ye POST isteği gönderiyoruz
            fetch("https://reqres.in/api/users", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    name: ad,
                    job: meslek
                })
            })
            .then(function(response) {
                // Gelen ham cevabı JSON formatına çeviriyoruz
                return response.json();
            })
            .then(function(data) {
                // 3. Dönen id değeri ile ekrana mesajı yazdırıyoruz
                document.getElementById("sonucAlani").style.color = "green";
                document.getElementById("sonucAlani").innerText =
                    "Sayın " + ad + ", " + data.id + " numaralı kaydınız oluşturulmuştur.";
            })
            .catch(function(error) {
                // Bir hata olursa (internet yok, sunucu cevap vermedi vb.)
                document.getElementById("sonucAlani").style.color = "red";
                document.getElementById("sonucAlani").innerText =
                    "Bir hata oluştu, lütfen tekrar deneyin.";
                console.error("Hata:", error);
            });

        });
    </script>

</body>
</html>
