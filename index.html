<?xml version="1.0" encoding="utf-8"?>
<OfficeApp
    xmlns="http://schemas.microsoft.com/office/appforoffice/1.1"
    xmlns:xsi="http://www.w3.org/2001/XMLSchema-instance"
    xsi:type="MailApp">

    <Id>ef89bfa4-287c-41d1-a831-511a06abe654</Id>
    <Version>1.0</Version>
    <ProviderName>Melih Can</ProviderName>
    <DefaultLocale>tr-TR</DefaultLocale>
    <DisplayName DefaultValue="Rigosis Kayıt Formu"/>
    <Description DefaultValue="Kullanıcıdan ad ve meslek bilgisi alıp kayıt oluşturan form"/>
    <IconUrl DefaultValue="https://melihcanmelek.github.io/rigosis-proje/icon-32.png"/>
    <HighResolutionIconUrl DefaultValue="https://melihcanmelek.github.io/rigosis-proje/icon-64.png"/>
    <SupportUrl DefaultValue="https://melihcanmelek.github.io/rigosis-proje/"/>

    <Hosts>
        <Host Name="Mailbox"/>
    </Hosts>

    <Requirements>
        <Sets DefaultMinVersion="1.1">
            <Set Name="Mailbox"/>
        </Sets>
    </Requirements>

    <FormSettings>
        <Form xsi:type="ItemRead">
            <DesktopSettings>
                <SourceLocation DefaultValue="https://melihcanmelek.github.io/rigosis-proje/"/>
                <RequestedHeight>250</RequestedHeight>
            </DesktopSettings>
        </Form>
    </FormSettings>

    <Permissions>ReadItem</Permissions>

    <Rule xsi:type="RuleCollection" Mode="Or">
        <Rule xsi:type="ItemIs" ItemType="Message" FormType="Read"/>
        <Rule xsi:type="ItemIs" ItemType="Appointment" FormType="Read"/>
    </Rule>

</OfficeApp>
